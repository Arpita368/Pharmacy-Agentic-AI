<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory — PharmaAI</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/variables.css">
    <link rel="stylesheet" href="/frontend/css/global.css">
    <link rel="stylesheet" href="/frontend/css/inventory.css">
</head>

<body>
<div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><i class="fa-solid fa-dna"></i></div>
            <div>
                <h1>PharmaAI</h1>
                <span>Agentic System</span>
            </div>
        </div>

        <div class="nav-section">
            <div class="nav-section-label">Navigation</div>
            <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-user-nurse"></i>AI Pharmacist</a>
            <a href="inventory.html" class="nav-link active"><i class="fa-solid fa-pills"></i>Inventory</a>
            <a href="analytics.html" class="nav-link"><i class="fa-solid fa-chart-line"></i>Analytics</a>
            <a href="scanner.html" class="nav-link"><i class="fa-solid fa-file-prescription"></i>Rx Scanner</a>
            <a href="orders.html" class="nav-link"><i class="fa-solid fa-receipt"></i>Orders</a>
        </div>
    </aside>

    <div class="sidebar-overlay"></div>

    <!-- MAIN -->
    <main class="app-main">

        <header class="topbar">
            <div class="topbar-left">
                <button class="btn-icon hamburger"><i class="fa-solid fa-bars"></i></button>
                <div>
                    <div class="topbar-title">Stock Management</div>
                    <div class="topbar-subtitle">AI-powered inventory intelligence</div>
                </div>
            </div>

            <!--div class="topbar-right">
                <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
                <button id="add-btn" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Add Medicine
                </button>
            </div-->
        </header>

        <div class="page-content">

            <!-- STATS -->
            <div class="inv-stats-row" id="inv-stats"></div>

            <!-- CONTROLS -->
            <div class="inv-controls">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" class="form-control"
                        placeholder="Search medicines…">
                </div>

                <select id="filter-status" class="form-control filter-select">
                    <option value="">All Status</option>
                    <option>In Stock</option>
                    <option>Low Stock</option>
                    <option>Out of Stock</option>
                </select>
            </div>

            <!-- INVENTORY TABLE -->
            <div class="table-wrap glass">
                <table id="inv-table">
                    <thead>
                        <tr>
                            <th>Medicine</th>
                            <th>Package</th>
                            <th>Stock</th>
                            <th>Demand</th>
                            <th>Reorder</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="inventory-body"></tbody>
                </table>

                <div id="empty-state" class="empty-state hidden">
                    <i class="fa-solid fa-box-open"></i>
                    <p>No medicines found.</p>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- ADD MEDICINE MODAL -->
<div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h3 class="modal-title">Add Medicine</h3>
            <button id="modal-close" class="btn-icon">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form id="inv-form">
            <input type="hidden" id="f-id">
            <div class="form-grid">

                <div class="form-group full">
                    <label class="form-label">Medicine Name</label>
                    <input id="f-name" class="form-control" required placeholder="e.g. Amoxicillin 500mg">
                </div>

                <div class="form-group">
                    <label class="form-label">Stock</label>
                    <input id="f-stock" type="number" class="form-control"  min="0" required placeholder="0">
                </div>

                <div class="form-group">
                    <label class="form-label">Price</label>
                    <input id="f-price" type="number" min="0" step="0.01" class="form-control" required  placeholder="0.00">
                </div>

            </div>

            <div class="modal-footer">
                <button type="button" id="modal-cancel" class="btn btn-ghost">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>

<div id="toast-container"></div>

<script src="/frontend/js/shared.js"></script>
<script src="/frontend/js/inventory.js"></script>

</body>
</html>
