<!DOCTYPE html>
<html>
<head>
    <title>Pharmacy Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #2c5aa0; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #1e3d6f; }
        .success { color: green; padding: 10px; background-color: #d4edda; border-radius: 4px; }
        .error { color: red; padding: 10px; background-color: #f8d7da; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🧴 Pharmacy Order</h1>
    
    <form id="orderForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required placeholder="john@example.com">
        </div>
        
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" required placeholder="9876543210">
        </div>
        
        <div class="form-group">
            <label>Medicine</label>
            <select id="medicine">
                <option value="Paracetamol 500mg">Paracetamol 500mg - ₹50.00</option>
                <option value="Amoxicillin 250mg">Amoxicillin 250mg - ₹120.00</option>
                <option value="Cetirizine 10mg">Cetirizine 10mg - ₹35.00</option>
                <option value="Vitamin D3">Vitamin D3 - ₹180.00</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" min="1" value="1" required>
        </div>
        
        <button type="submit">Pay Now</button>
    </form>
    
    <div id="message"></div>

    <script>
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const medicinePrices = {
                "Paracetamol 500mg": 50,
                "Amoxicillin 250mg": 120,
                "Cetirizine 10mg": 35,
                "Vitamin D3": 180
            };
            
            const medicine = document.getElementById('medicine').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const amount = medicinePrices[medicine] * quantity;
            
            const orderData = {
                customer_name: document.getElementById('name').value,
                customer_email: document.getElementById('email').value,
                customer_phone: document.getElementById('phone').value,
                medicine_name: medicine,
                quantity: quantity,
                amount: amount
            };
            
            try {
                // Step 1: Create order on backend
                const response = await fetch('http://localhost:8000/create-order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(orderData)
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error('Failed to create order');
                }
                
                // Step 2: Initialize Razorpay checkout
                const options = {
                    key: data.key_id,
                    amount: data.amount * 100,
                    currency: data.currency,
                    name: "PharmaCare Pharmacy",
                    description: data.description,
                    order_id: data.order_id,
                    handler: async function (response) {
                        // Step 3: Verify payment
                        const verifyResponse = await fetch('http://localhost:8000/verify-payment', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature
                            })
                        });
                        
                        const verifyData = await verifyResponse.json();
                        
                        if (verifyData.success) {
                            document.getElementById('message').innerHTML = `
                                <div class="success">
                                    ✅ Payment Successful!<br>
                                    Order ID: ${verifyData.order_id}<br>
                                    Payment ID: ${verifyData.payment_id}<br>
                                    Invoice has been sent to your email and SMS.
                                </div>
                            `;
                        }
                    },
                    prefill: {
                        name: data.customer_name,
                        email: data.customer_email,
                        contact: data.customer_phone
                    },
                    theme: {
                        color: "#2c5aa0"
                    }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();
                
            } catch (error) {
                document.getElementById('message').innerHTML = `
                    <div class="error">❌ Error: ${error.message}</div>
                `;
            }
        });
    </script>
</body>
</html>
